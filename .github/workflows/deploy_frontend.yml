name: Deploy Frontend to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: triqui_doble_frontend/package-lock.json

      - name: Install dependencies
        working-directory: ./triqui_doble_frontend
        run: npm install --legacy-peer-deps

      - name: Build Angular App
        working-directory: ./triqui_doble_frontend
        run: npm run build -- --configuration production --base-href /Triqui_Doble/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./triqui_doble_frontend/dist/triqui_doble_frontend

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
